<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH PARK | Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ПАЛІТРА: БІЛЬШЕ БІЛОГО ТА СВІТЛИХ ВІДТІНКІВ */
        :root { 
            --bg: #F8F5F2;          /* Основний фон (світлий льон) */
            --card-bg: #FFFFFF;     /* Білі картки */
            --text-main: #2A2420;   /* Темний еспресо текст */
            --text-muted: #A89B8D;  /* Мутний беж для деталей */
            --border: #E9E2D8;      /* Світлі межі */
            --accent: #1A1613;      /* Темний шоколад (кнопки) */
            --accent-text: #FFFFFF; /* Білий текст на кнопці */
            --panel-bg: #FFFFFF;    /* Світлий фон бічних панелей (IMAGE_7.PNG STYLE) */
        }

        /* ТЕМНА ТЕМА */
        body.dark-theme {
            --bg: #12100E;          
            --card-bg: #1A1715;     
            --text-main: #E0D9D1;   
            --text-muted: #8E857D;  
            --border: #2B2522;      
            --accent: #D4C5B3;      
            --accent-text: #12100E; 
            --panel-bg: #1A1715;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; text-transform: uppercase; letter-spacing: 1px; transition: background 0.4s, color 0.4s; overflow-x: hidden; }

        /* PRELOADER З ПЕРЕЛИВОМ */
        #preloader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 1s ease; }
        #preloader.done { opacity: 0; visibility: hidden; }
        .loader-text { font-family: 'Great Vibes', cursive; font-size: 4rem; text-transform: none; background: linear-gradient(90deg, #555, #fff, #555); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2s linear infinite; }
        @keyframes shimmer { to { background-position: 200% auto; } }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--card-bg); position: sticky; top: 0; z-index: 5000; border-bottom: 1px solid var(--border); height: 75px; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .header-left, .header-right { display: flex; align-items: center; gap: 25px; color: var(--text-main); }
        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; cursor: pointer; color: var(--text-main); background: linear-gradient(90deg, var(--text-main), var(--accent), var(--text-main)); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
        .header-right i { cursor: pointer; font-size: 1.3rem; transition: 0.3s; color: var(--text-main); position: relative; }
        .badge { position: absolute; top: -8px; right: -10px; background: var(--accent); color: var(--accent-text); font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; }

        /* SIDEBAR (Меню та Кошик) */
        .side-panel { position: fixed; top: 0; width: 100%; max-width: 450px; height: 100%; background: var(--panel-bg); z-index: 7000; transition: 0.5s ease; padding: 60px 30px; overflow-y: auto; color: var(--text-main); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .sidebar { left: -100%; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .right-panel { right: -100%; border-left: 1px solid var(--border); }
        .right-panel.active { right: 0; }

        .panel-close { text-align: right; cursor: pointer; font-size: 1.5rem; margin-bottom: 30px; color: var(--text-muted); transition: 0.3s; }
        .panel-close:hover { color: var(--text-main); }

        /* МЕНЮ (IMAGE_7.PNG STYLE) */
        .sidebar p { cursor: pointer; margin-bottom: 25px; font-weight: 800; font-size: 0.95rem; transition: 0.3s; color: var(--text-main); display: flex; align-items: center; gap: 15px; text-transform: uppercase; }
        .sidebar p:not(.cat-link):hover { color: var(--accent); }
        
        .cat-link { border-top: 1px solid var(--border); padding-top: 25px; margin-top: 25px; }
        .cat-link.new { color: #28A745; } /* ЗЕЛЕНИЙ */
        .cat-link.sale { color: #DC3545; } /* ЧЕРВОНИЙ */

        /* ТУМБЛЕР ТЕМИ ВНИЗУ */
        .theme-toggle-wrapper { position: absolute; bottom: 40px; left: 40px; display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 10px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); }
        .toggle-track { width: 50px; height: 26px; background: var(--border); border-radius: 15px; position: relative; transition: 0.3s; }
        .toggle-thumb { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        body.light-theme #theme-thumb { left: 27px; background: #FFD700; }
        body.dark-theme #theme-thumb { left: 3px; background: #E0D9D1; }

        /* TABS ТА КАРТКИ */
        .tabs { display: flex; justify-content: center; gap: 50px; margin: 40px 0 20px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.4s; padding-bottom: 8px; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 900px) { .container { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 40px; } }

        .product-card { background: var(--card-bg); overflow: hidden; border-radius: 12px; border: 1px solid var(--border); transition: 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); border-color: var(--accent); }
        .img-wrap { position: relative; overflow: hidden; width: 100%; aspect-ratio: 3/4; background: var(--bg); }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: 1s ease; }
        
        .product-info { padding: 25px; text-align: left; }
        .product-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.5px; color: var(--text-muted); text-transform: uppercase; }
        .product-price { font-size: 1.1rem; font-weight: 900; margin-bottom: 20px; color: var(--text-main); }

        .size-picker { display: flex; gap: 8px; margin-bottom: 25px; }
        .size-btn { border: 1px solid var(--border); background: none; color: var(--text-muted); width: 38px; height: 38px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; border-radius: 6px; font-weight: 700; }
        .size-btn:hover { border-color: var(--text-muted); color: var(--text-main); }
        .size-btn.selected { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

        .buy-btn { background: var(--accent); color: var(--accent-text); border: none; width: 100%; padding: 18px; cursor: pointer; font-weight: 900; font-size: 0.85rem; transition: 0.3s; border-radius: 8px; text-transform: uppercase; }
        .buy-btn:hover { opacity: 0.8; }

        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .cart-item img { width: 80px; height: 100px; object-fit: cover; border-radius: 6px; }

        .review-card { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); text-transform: none; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .stars { color: #E5C158; font-size: 0.8rem; margin: 5px 0 10px; }

        #order-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); padding: 40px 30px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .modal-content input { width: 100%; padding: 18px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text-main); outline: none; border-radius: 8px; font-family: 'Inter'; text-transform: uppercase; }

        footer { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 50px; background: var(--card-bg); }
        
        /* OVERLAY ДЛЯ ЗАКРИТТЯ НАЖАТТЯМ ПО ЕКРАНУ */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 6000; display: none; backdrop-filter: blur(2px); transition: 0.3s; }
        .overlay.active { display: block; }
    </style>
</head>
<body class="light-theme"> <div id="preloader"><div class="loader-text">North Park</div></div>
    <div class="overlay" onclick="closeAllPanels()"></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <div class="logo" onclick="location.reload()">NORTH PARK</div>
        </div>
        <div class="header-right">
            <i class="fas fa-heart" onclick="togglePanel('wish-panel')"><span id="wish-count" class="badge">0</span></i>
            <i class="fas fa-shopping-cart" onclick="togglePanel('cart-panel')"><span id="cart-count" class="badge">0</span></i>
        </div>
    </header>

    <div id="sidebar" class="side-panel sidebar">
        <div class="panel-close" onclick="closeAllPanels()"><i class="fas fa-times"></i></div>
        
        <p onclick="alert('North Park — твій стиль')"><i class="fas fa-user-friends"></i> ПРО НАС</p>
        <p onclick="togglePanel('reviews-panel'); toggleSidebar();"><i class="fas fa-star"></i> ВІДГУКИ</p>
        <p onclick="window.open('https://instagram.com/northpark.shop')"><i class="fab fa-instagram"></i> INSTAGRAM</p>
        <p onclick="window.open('viber://chat?number=+380XXXXXXXXX')"><i class="fab fa-viber"></i> VIBER</p>
        <p onclick="window.open('https://northpark-ua.github.io/payment/')"><i class="fas fa-info-circle"></i> ОПЛАТА ТА ДОСТАВКА</p>
        
        <p class="cat-link new" onclick="changeCategory('new', this); closeAllPanels();">НОВИНКИ (ЗЕЛЕНИЙ)</p>
        <p class="cat-link sale" onclick="changeCategory('sale', this); closeAllPanels();">ЗНИЖКИ (ЧЕРВОНИЙ)</p>

        <div class="theme-toggle-wrapper" onclick="toggleTheme()">
            <i class="fas fa-moon" id="theme-moon"></i>
            <div class="toggle-track">
                <div class="toggle-thumb" id="theme-thumb"></div>
            </div>
            <i class="fas fa-sun" id="theme-sun"></i>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeCategory('new', this)">НОВИНКИ</button>
        <button class="tab-btn" onclick="changeCategory('sale', this)">РОЗПРОДАЖ</button>
    </div>

    <div class="container" id="box"></div>

    <div id="cart-panel" class="side-panel right-panel">
        <div class="panel-close" onclick="closeAllPanels()"><i class="fas fa-times"></i></div>
        <h2 style="font-weight: 900; margin-bottom: 40px; color: var(--text-muted); text-align: center;">КОШИК</h2>
        <div id="cart-list"></div>
        <div id="total-price" style="margin-top: 30px; font-weight: 900; font-size: 1.4rem; display: none; border-top: 1px solid var(--border); padding-top: 20px; text-align: center;"></div>
        <button class="buy-btn" id="order-btn" style="display:none; margin-top: 30px;" onclick="openOrderModal()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
    </div>

    <div id="wish-panel" class="side-panel right-panel">
        <div class="panel-close" onclick="closeAllPanels()"><i class="fas fa-times"></i></div>
        <h2 style="color: var(--text-muted); text-align: center;">ОБРАНЕ</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 20px; text-align: center;">Список порожній.</p>
    </div>

    <div id="reviews-panel" class="side-panel right-panel">
        <div class="panel-close" onclick="closeAllPanels()"><i class="fas fa-times"></i></div>
        <h2 style="font-weight: 900; margin-bottom: 30px; color: var(--text-muted); text-align: center;">ВІДГУКИ КЛІЄНТІВ</h2>
        <div id="reviews-list"></div>
    </div>

    <div id="order-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 30px; font-weight: 900;">ОФОРМЛЕННЯ</h2>
            <input type="text" id="u-name" placeholder="ПІБ">
            <input type="text" id="u-phone" placeholder="НОМЕР ТЕЛЕФОНУ">
            <input type="text" id="u-city" placeholder="МІСТО ТА НОВА ПОШТА">
            <button class="buy-btn" onclick="sendToTelegram()" style="margin-top: 20px;">ВІДПРАВИТИ</button>
            <p onclick="document.getElementById('order-modal').style.display='none'" style="cursor:pointer; margin-top:25px; font-size:0.75rem; color:var(--text-muted); font-weight: 700;">СКАСУВАТИ</p>
        </div>
    </div>

    <footer>© 2026 NORTH PARK. ALL RIGHTS RESERVED.</footer>

    <script>
        const BOT_TOKEN = '8469565804:AAH7DZFzs41vH3qSpe_ZD0VhwmThAJHlVhs';
        const CHAT_ID = '8609029382';

        const products = [
            { id: 1, name: "HOODIE 'ARCH' GRAPHITE", price: 1450, cat: "new", img: "https://via.placeholder.com/600x800/EEE9E2/1A1613?text=NORTH+PARK" },
            { id: 2, name: "ZIP-HOODIE 'ESSENTIAL' BLACK", price: 1600, cat: "new", img: "https://via.placeholder.com/600x800/EEE9E2/1A1613?text=NORTH+PARK" },
            { id: 3, name: "JOGGERS 'NIGHT' TECH", price: 1200, cat: "new", img: "https://via.placeholder.com/600x800/EEE9E2/1A1613?text=NORTH+PARK" },
            { id: 4, name: "CARGO PANTS 'URBAN'", price: 1550, cat: "new", img: "https://via.placeholder.com/600x800/EEE9E2/1A1613?text=NORTH+PARK" },
            { id: 5, name: "T-SHIRT 'RAW' WHITE", price: 750, cat: "sale", img: "https://via.placeholder.com/600x800/E9E2D8/1A1613?text=SALE" },
            { id: 6, name: "SHORTS 'SUMMER' BEIGE", price: 650, cat: "sale", img: "https://via.placeholder.com/600x800/E9E2D8/1A1613?text=SALE" }
        ];

        const reviews = [
            { name: "Олександр М.", date: "14 Листопада 2025", text: "Замовляв худі і джогери. Якість просто топ, матеріал плотний, на осінь/зиму ідеально. Менеджер швидко відповів." },
            { name: "Максим", date: "02 Жовтня 2025", text: "Брав зіпку. Сіла чітко по фігурі. Дякую за допомогу з розміром." },
            { name: "Діана", date: "28 Серпня 2025", text: "Дуже стильне пакування і сама річ виглядає дорого. Хлопець задоволений." }
        ];

        let cart = [];
        let selectedSizes = {};

        window.onload = () => {
            setTimeout(() => document.getElementById('preloader').classList.add('done'), 1000);
            show('new');
            renderReviews();
            updateThemeUI(); // Ініціалізація тумблера
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
            updateThemeUI();
        }

        function updateThemeUI() {
            const isDark = document.body.classList.contains('dark-theme');
            const thumb = document.getElementById('theme-thumb');
            const moon = document.getElementById('theme-moon');
            const sun = document.getElementById('theme-sun');

            if (isDark) {
                thumb.style.left = '3px';
                moon.style.color = 'var(--accent)';
                sun.style.color = 'var(--text-muted)';
            } else {
                thumb.style.left = '27px';
                sun.style.color = '#FFD700';
                moon.style.color = 'var(--text-muted)';
            }
        }

        function toggleSidebar() { 
            closeAllPanels();
            document.getElementById('sidebar').classList.add('active'); 
            document.querySelector('.overlay').classList.add('active');
        }

        function togglePanel(id) { 
            closeAllPanels();
            document.getElementById(id).classList.add('active'); 
            document.querySelector('.overlay').classList.add('active');
        }

        function closeAllPanels() {
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
            document.querySelector('.overlay').classList.remove('active');
        }

        function renderReviews() {
            document.getElementById('reviews-list').innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <div class="review-name">${r.name}</div>
                        <div class="review-date">${r.date}</div>
                    </div>
                    <div class="stars">★★★★★</div>
                    <div class="review-text" style="margin-top: 10px;">${r.text}</div>
                </div>
            `).join('');
        }

        function selectSize(productId, size, btn) {
            selectedSizes[productId] = size;
            const card = btn.closest('.product-card');
            card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function show(cat) {
            const box = document.getElementById('box');
            box.innerHTML = products.filter(p => p.cat === cat).map(p => `
                <div class="product-card">
                    <div class="img-wrap"><img src="${p.img}"></div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} UAH</div>
                        <div class="size-picker">
                            <button class="size-btn" onclick="selectSize(${p.id}, 'S', this)">S</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'M', this)">M</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'L', this)">L</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'XL', this)">XL</button>
                        </div>
                        <button class="buy-btn" onclick="addToCart(${p.id})">У КОШИК</button>
                    </div>
                </div>
            `).join('');
        }

        function changeCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn.tagName === 'BUTTON') btn.classList.add('active');
            show(cat);
        }

        function addToCart(id) {
            if (!selectedSizes[id]) { alert("ОБЕРІТЬ РОЗМІР!"); return; }
            const product = {...products.find(p => p.id === id), size: selectedSizes[id]};
            cart.push(product);
            updateUI();
            togglePanel('cart-panel');
        }

        function updateUI() {
            const badge = document.getElementById('cart-count');
            badge.innerText = cart.length; badge.style.display = cart.length > 0 ? 'flex' : 'none';
            
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((i, index) => {
                total += i.price;
                return `
                <div class="cart-item">
                    <img src="${i.img}">
                    <div style="flex-grow: 1; text-transform: none;">
                        <div style="font-weight:700; font-size:0.85rem; color:var(--text-main);">${i.name}</div>
                        <div style="color:var(--text-muted); font-size:0.75rem; margin-top:5px; font-weight: 700;">РОЗМІР: ${i.size}</div>
                        <div style="font-weight:900; margin-top:10px; color:var(--text-main);">${i.price} UAH</div>
                    </div>
                    <i class="fas fa-times" onclick="removeFromCart(${index})" style="cursor:pointer; color:var(--text-muted); font-size:1.2rem;"></i>
                </div>`;
            }).join('');
            
            document.getElementById('total-price').innerText = `СУМА: ${total} UAH`;
            document.getElementById('total-price').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('order-btn').style.display = cart.length > 0 ? 'block' : 'none';
        }

        function removeFromCart(index) { cart.splice(index, 1); updateUI(); }
        function openOrderModal() { closeAllPanels(); document.getElementById('order-modal').style.display = 'flex'; }

        function sendToTelegram() {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-phone').value;
            const c = document.getElementById('u-city').value;
            if(!n || !p || !c) return;

            let msg = `🏔 НОВЕ ЗАМОВЛЕННЯ\n\n👤 Клієнт: ${n}\n📞 Тел: ${p}\n📍 НП: ${c}\n\n📦 Товари:\n` + 
                      cart.map(i => `- ${i.name} (Розмір: ${i.size})`).join('\n');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            }).then(() => {
                cart = []; updateUI();
                document.getElementById('order-modal').style.display = 'none';
                alert("Замовлення успішно відправлено!");
            });
        }
    </script>
</body>
</html>
