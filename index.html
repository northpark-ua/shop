<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH PARK | Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ТЕМНА ТЕМА (ЗА ЗАМОВЧУВАННЯМ) */
        :root { 
            --bg: #12100E;          /* Кавово-чорний */
            --card-bg: #1A1715;     /* Темна картка */
            --text-main: #E0D9D1;   /* Кремовий текст */
            --text-muted: #8E857D;  /* Мутний текст */
            --border: #2B2522;      /* Легкі межі */
            --accent: #D4C5B3;      /* Колір капучино (кнопки) */
            --accent-text: #12100E; /* Текст на кнопці */
            --panel-bg: #12100E;    /* Фон бічних панелей */
        }

        /* СВІТЛА ТЕМА (КОЛІР ЛЬОНУ) */
        body.light-theme {
            --bg: #F8F5F2;          
            --card-bg: #FFFFFF;     
            --text-main: #2A2420;   
            --text-muted: #A89B8D;  
            --border: #E9E2D8;      
            --accent: #1A1613;      
            --accent-text: #FFFFFF; 
            --panel-bg: #F8F5F2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; text-transform: uppercase; letter-spacing: 1px; transition: background 0.4s, color 0.4s; overflow-x: hidden; }

        /* PRELOADER */
        #preloader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 1s ease; }
        #preloader.done { opacity: 0; visibility: hidden; }
        .loader-text { font-family: 'Great Vibes', cursive; font-size: 4rem; text-transform: none; color: var(--accent); }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--bg); position: sticky; top: 0; z-index: 5000; border-bottom: 1px solid var(--border); height: 75px; transition: 0.4s; }
        .header-left, .header-right { display: flex; align-items: center; gap: 25px; }
        .logo { font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; cursor: pointer; color: var(--text-main); }
        .header-right i { cursor: pointer; font-size: 1.3rem; transition: 0.3s; color: var(--text-main); position: relative; }
        .header-right i:hover { color: var(--accent); }
        .badge { position: absolute; top: -8px; right: -10px; background: var(--accent); color: var(--accent-text); font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -100%; width: 100%; max-width: 320px; height: 100%; background: var(--panel-bg); z-index: 7000; transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); padding: 80px 40px; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .sidebar p { cursor: pointer; margin-bottom: 30px; font-weight: 600; font-size: 0.95rem; transition: 0.3s; color: var(--text-main); display: flex; align-items: center; gap: 15px; }
        .sidebar p:hover { color: var(--accent); padding-left: 5px; }
        .panel-close { text-align: right; cursor: pointer; font-size: 1.5rem; margin-bottom: 40px; color: var(--text-main); }

        /* TABS */
        .tabs { display: flex; justify-content: center; gap: 50px; margin: 40px 0 20px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.4s; padding-bottom: 8px; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        /* КАРТКИ ТОВАРІВ */
        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; max-width: 1400px; margin: 0 auto; }
        @media (min-width: 900px) { .container { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 40px; } }

        .product-card { background: var(--card-bg); overflow: hidden; border-radius: 12px; border: 1px solid var(--border); transition: 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-color: var(--accent); }
        
        .img-wrap { position: relative; overflow: hidden; width: 100%; aspect-ratio: 3/4; background: var(--border); }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: 1s ease; }
        
        .product-info { padding: 25px; text-align: left; }
        .product-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.5px; color: var(--text-muted); }
        .product-price { font-size: 1.2rem; font-weight: 900; margin-bottom: 20px; color: var(--text-main); }

        .size-picker { display: flex; gap: 8px; margin-bottom: 25px; }
        .size-btn { border: 1px solid var(--border); background: none; color: var(--text-main); width: 38px; height: 38px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; border-radius: 4px; font-weight: 600; }
        .size-btn.selected { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

        .buy-btn { background: var(--accent); color: var(--accent-text); border: none; width: 100%; padding: 18px; cursor: pointer; font-weight: 900; font-size: 0.85rem; transition: 0.3s; border-radius: 8px; }
        .buy-btn:hover { opacity: 0.8; }

        /* SIDE PANELS (КОШИК ТА ВІДГУКИ) */
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100%; background: var(--panel-bg); z-index: 7000; transition: 0.5s ease; border-left: 1px solid var(--border); padding: 50px 30px; overflow-y: auto; color: var(--text-main); }
        .side-panel.active { right: 0; }
        
        .cart-item { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .cart-item img { width: 80px; height: 100px; object-fit: cover; border-radius: 6px; }

        /* ВІДГУКИ */
        .review-card { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); text-transform: none; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .review-name { font-weight: 900; color: var(--text-main); font-size: 0.95rem; }
        .review-date { font-size: 0.75rem; color: var(--text-muted); }
        .review-text { font-size: 0.9rem; color: var(--text-main); line-height: 1.5; }
        .stars { color: #E5C158; font-size: 0.8rem; margin-top: 5px; }

        /* MODAL ОФОРМЛЕННЯ */
        #order-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); padding: 40px 30px; border-radius: 16px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 18px; margin: 10px 0; background: var(--bg); border: 1px solid var(--border); color: var(--text-main); outline: none; border-radius: 8px; font-family: 'Inter'; text-transform: uppercase; }

        footer { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body>

    <div id="preloader"><div class="loader-text">North Park</div></div>

    <header>
        <div class="header-left">
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <div class="logo" onclick="location.reload()">NORTH PARK</div>
        </div>
        <div class="header-right">
            <i class="fas fa-heart" onclick="togglePanel('wish-panel')"><span id="wish-count" class="badge">0</span></i>
            <i class="fas fa-shopping-cart" onclick="togglePanel('cart-panel')"><span id="cart-count" class="badge">0</span></i>
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="panel-close" onclick="toggleSidebar()"><i class="fas fa-times"></i></div>
        
        <p onclick="toggleTheme()"><i class="fas fa-adjust"></i> ЗМІНИТИ ТЕМУ 🌓</p>
        <p onclick="togglePanel('reviews-panel'); toggleSidebar();"><i class="fas fa-star"></i> ВІДГУКИ</p>
        <p onclick="window.open('https://instagram.com/northpark.shop')"><i class="fab fa-instagram"></i> INSTAGRAM</p>
        <p onclick="window.open('viber://chat?number=+380XXXXXXXXX')"><i class="fab fa-viber"></i> VIBER</p>
        <p onclick="window.open('https://northpark-ua.github.io/payment/')"><i class="fas fa-info-circle"></i> ОПЛАТА ТА ДОСТАВКА</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeCategory('new', this)">НОВИНКИ</button>
        <button class="tab-btn" onclick="changeCategory('sale', this)">РОЗПРОДАЖ</button>
    </div>

    <div class="container" id="box"></div>

    <div id="cart-panel" class="side-panel">
        <div class="panel-close" onclick="togglePanel('cart-panel')"><i class="fas fa-times"></i></div>
        <h2 style="font-weight: 900; margin-bottom: 40px; color: var(--text-muted);">КОШИК</h2>
        <div id="cart-list"></div>
        <div id="total-price" style="margin-top: 30px; font-weight: 900; font-size: 1.4rem; display: none; border-top: 1px solid var(--border); padding-top: 20px;"></div>
        <button class="buy-btn" id="order-btn" style="display:none; margin-top: 30px;" onclick="openOrderModal()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>
    </div>

    <div id="wish-panel" class="side-panel">
        <div class="panel-close" onclick="togglePanel('wish-panel')"><i class="fas fa-times"></i></div>
        <h2 style="color: var(--text-muted);">ОБРАНЕ</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 20px;">Список порожній.</p>
    </div>

    <div id="reviews-panel" class="side-panel">
        <div class="panel-close" onclick="togglePanel('reviews-panel')"><i class="fas fa-times"></i></div>
        <h2 style="font-weight: 900; margin-bottom: 30px; color: var(--text-muted);">ВІДГУКИ КЛІЄНТІВ</h2>
        <div id="reviews-list"></div>
    </div>

    <div id="order-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 30px; font-weight: 900;">ОФОРМЛЕННЯ</h2>
            <input type="text" id="u-name" placeholder="ПІБ">
            <input type="text" id="u-phone" placeholder="НОМЕР ТЕЛЕФОНУ">
            <input type="text" id="u-city" placeholder="МІСТО ТА НОВА ПОШТА">
            <button class="buy-btn" onclick="sendToTelegram()" style="margin-top: 20px;">ВІДПРАВИТИ</button>
            <p onclick="document.getElementById('order-modal').style.display='none'" style="cursor:pointer; margin-top:25px; font-size:0.75rem; color:var(--text-muted); font-weight: 700;">СКАСУВАТИ</p>
        </div>
    </div>

    <footer>© 2026 NORTH PARK. ALL RIGHTS RESERVED.</footer>

    <script>
        const BOT_TOKEN = '8469565804:AAH7DZFzs41vH3qSpe_ZD0VhwmThAJHlVhs';
        const CHAT_ID = '8609029382';

        // ТОВАРИ
        const products = [
            { id: 1, name: "HOODIE 'ARCH' GRAPHITE", price: 1450, cat: "new", img: "https://via.placeholder.com/600x800/1A1715/E0D9D1?text=NORTH+PARK" },
            { id: 2, name: "ZIP-HOODIE 'ESSENTIAL' BLACK", price: 1600, cat: "new", img: "https://via.placeholder.com/600x800/1A1715/E0D9D1?text=NORTH+PARK" },
            { id: 3, name: "JOGGERS 'NIGHT' TECH", price: 1200, cat: "new", img: "https://via.placeholder.com/600x800/1A1715/E0D9D1?text=NORTH+PARK" },
            { id: 4, name: "CARGO PANTS 'URBAN'", price: 1550, cat: "new", img: "https://via.placeholder.com/600x800/1A1715/E0D9D1?text=NORTH+PARK" },
            { id: 5, name: "T-SHIRT 'RAW' WHITE", price: 750, cat: "sale", img: "https://via.placeholder.com/600x800/2B2522/E0D9D1?text=SALE" },
            { id: 6, name: "SHORTS 'SUMMER' BEIGE", price: 650, cat: "sale", img: "https://via.placeholder.com/600x800/2B2522/E0D9D1?text=SALE" }
        ];

        // ВІДГУКИ З 2025 РОКУ
        const reviews = [
            { name: "Олександр М.", date: "14 Листопада 2025", text: "Замовляв худі і джогери. Якість просто топ, матеріал плотний, на осінь/зиму ідеально. Менеджер швидко відповів, відправили в той же день. Рекомендую!" },
            { name: "Максим", date: "02 Жовтня 2025", text: "Брав зіпку. Сіла чітко по фігурі. Дякую за допомогу з розміром, бо сам би точно прогадав. Магазину респект 🤝" },
            { name: "Діана", date: "28 Серпня 2025", text: "Купувала хлопцю на подарунок. Дуже стильне пакування і сама річ виглядає дорого. Хлопець задоволений, будемо замовляти ще." },
            { name: "Ігор", date: "15 Травня 2025", text: "Футболка шикарна, після прання не сіла і принт на місці. Ціна виправдовує якість на 100%." }
        ];

        let cart = [];
        let selectedSizes = {};

        window.onload = () => {
            setTimeout(() => document.getElementById('preloader').classList.add('done'), 1000);
            show('new');
            renderReviews();
        };

        // ПЕРЕМИКАЧ ТЕМИ
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }

        function renderReviews() {
            document.getElementById('reviews-list').innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <div class="review-name">${r.name}</div>
                        <div class="review-date">${r.date}</div>
                    </div>
                    <div class="stars">★★★★★</div>
                    <div class="review-text" style="margin-top: 10px;">${r.text}</div>
                </div>
            `).join('');
        }

        function selectSize(productId, size, btn) {
            selectedSizes[productId] = size;
            const card = btn.closest('.product-card');
            card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function show(cat) {
            const box = document.getElementById('box');
            box.innerHTML = products.filter(p => p.cat === cat).map(p => `
                <div class="product-card">
                    <div class="img-wrap"><img src="${p.img}"></div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price} UAH</div>
                        <div class="size-picker">
                            <button class="size-btn" onclick="selectSize(${p.id}, 'S', this)">S</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'M', this)">M</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'L', this)">L</button>
                            <button class="size-btn" onclick="selectSize(${p.id}, 'XL', this)">XL</button>
                        </div>
                        <button class="buy-btn" onclick="addToCart(${p.id})">У КОШИК</button>
                    </div>
                </div>
            `).join('');
        }

        function changeCategory(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            show(cat);
        }

        function addToCart(id) {
            if (!selectedSizes[id]) { alert("ОБЕРІТЬ РОЗМІР!"); return; }
            const product = {...products.find(p => p.id === id), size: selectedSizes[id]};
            cart.push(product);
            updateUI();
            togglePanel('cart-panel');
        }

        function updateUI() {
            const badge = document.getElementById('cart-count');
            badge.innerText = cart.length; badge.style.display = cart.length > 0 ? 'flex' : 'none';
            
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((i, index) => {
                total += i.price;
                return `
                <div class="cart-item">
                    <img src="${i.img}">
                    <div style="flex-grow: 1; text-transform: none;">
                        <div style="font-weight:700; font-size:0.85rem; color:var(--text-main);">${i.name}</div>
                        <div style="color:var(--text-muted); font-size:0.75rem; margin-top:5px; font-weight: 700;">РОЗМІР: ${i.size}</div>
                        <div style="font-weight:900; margin-top:10px; color:var(--text-main);">${i.price} UAH</div>
                    </div>
                    <i class="fas fa-times" onclick="removeFromCart(${index})" style="cursor:pointer; color:var(--text-muted); font-size:1.2rem;"></i>
                </div>`;
            }).join('');
            
            document.getElementById('total-price').innerText = `СУМА: ${total} UAH`;
            document.getElementById('total-price').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('order-btn').style.display = cart.length > 0 ? 'block' : 'none';
        }

        function removeFromCart(index) { cart.splice(index, 1); updateUI(); }
        function openOrderModal() { togglePanel('cart-panel'); document.getElementById('order-modal').style.display = 'flex'; }

        function sendToTelegram() {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-phone').value;
            const c = document.getElementById('u-city').value;
            if(!n || !p || !c) return;

            let msg = `🏔 НОВЕ ЗАМОВЛЕННЯ\n\n👤 Клієнт: ${n}\n📞 Тел: ${p}\n📍 НП: ${c}\n\n📦 Товари:\n` + 
                      cart.map(i => `- ${i.name} (Розмір: ${i.size})`).join('\n');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
            }).then(() => {
                cart = []; updateUI();
                document.getElementById('order-modal').style.display = 'none';
                alert("Замовлення успішно відправлено!");
            });
        }
    </script>
</body>
</html>
